# 工作流名称：Python 包自动构建与发布到 GitHub Release
name: Python Package Build & Release

# 触发条件
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 任务配置
jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 单个平台失败不影响其他平台
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: write  #  Release 读写权限

    steps:
      # 步骤1：拉取代码（修复分支/标签拉取失败问题）
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905382afc9b # v4.2.2 稳定哈希版
        with:
          ref: ${{ github.ref }} # 强制拉取触发本次运行的标签/分支
          fetch-depth: 0 # 拉取完整历史，避免标签识别失败

      # 步骤2：设置 Python 环境（稳定版，避免拉取失败）
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f29b0304e # v5.7.0 稳定哈希版
        with:
          python-version: '3.10'
          cache: 'pip'

      # 步骤3：安装系统依赖
      - name: Install system dependencies for Nuitka
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            sudo apt-get install -y gcc python3-dev make
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install make
          fi
        shell: bash

      # 步骤4：安装Python依赖（国内镜像，解决pip网络报错）
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install nuitka PyQt6 openpyxl xlrd python-docx openai
        shell: bash

      # 步骤5：执行1.txt中的打包命令
      - name: Run platform-specific commands from 1.txt
        run: |
          python << 'EOF'
          import os
          import sys

          runner_os = "${{ matrix.os }}"
          if runner_os == "ubuntu-latest":
              current_platform = "linux"
          elif runner_os == "macos-latest":
              current_platform = "mac"
          elif runner_os == "windows-latest":
              current_platform = "windows"

          print(f">>> 当前运行平台: {current_platform}")

          common_commands = []
          platform_commands = {"windows": [], "linux": [], "mac": []}
          current_section = None

          with open("1.txt", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.rstrip("\n")
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  if stripped in ["windows:", "linux:", "mac:"]:
                      current_section = stripped[:-1]
                      continue
                  if line.startswith("    ") or line.startswith("\t"):
                      if current_section:
                          platform_commands[current_section].append(stripped)
                  else:
                      current_section = None
                      common_commands.append(stripped)

          commands = common_commands + platform_commands[current_platform]

          if not commands:
              print("!!! 没有找到可执行的命令，请检查1.txt格式")
              sys.exit(1)

          for cmd in commands:
              print(f"\n>>> 正在执行命令: {cmd}")
              ret = os.system(cmd)
              if ret != 0:
                  print(f"!!! 命令执行失败: {cmd}，错误码: {ret}")
                  sys.exit(1)

          print(f"\n>>> {current_platform}平台所有命令执行完成！")
          EOF
        shell: bash

      # 步骤6：收集打包产物（兼容Windows/Linux/Mac）
      - name: Collect build artifacts
        run: |
          mkdir -p dist
          # Windows 产物收集
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv *.exe ./dist/ 2>/dev/null || true
          # Linux 产物收集
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            mv *.bin ./dist/ 2>/dev/null || true
            mv *.AppImage ./dist/ 2>/dev/null || true
            mv *.deb ./dist/ 2>/dev/null || true
            find . -maxdepth 2 -type f -executable ! -path "./.git/*" ! -path "./.github/*" -exec mv {} ./dist/ \; 2>/dev/null || true
          # Mac 产物收集
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            mv *.app ./dist/ 2>/dev/null || true
            find . -maxdepth 2 -type f -perm +111 ! -path "./.git/*" ! -path "./.github/*" -exec mv {} ./dist/ \; 2>/dev/null || true
          fi
        shell: bash

      # 步骤7：发布到GitHub Release（稳定版，避免拉取失败）
      - name: Create Release and upload assets
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8 稳定哈希版
        with:
          files: ./dist/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false # 单个平台无产物不报错
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
