# 符合原生语法的云端指令运行平台 - 工作流配置
name: 云端指令运行平台
# 触发条件：支持手动触发，也支持标签触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
# 任务配置
jobs:
  run-tasks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 单个平台失败不影响其他平台
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: write
    steps:
      # 步骤1：拉取代码
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905382afc9b
        with:
          fetch-depth: 0
      # 步骤2：设置Python环境
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f29b0304e
        with:
          python-version: '3.10'
          cache: 'pip'
      # 步骤3：安装基础依赖
      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip requests tqdm
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
        shell: bash
      # 步骤4：安装系统基础工具
      - name: Install system tools
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            sudo apt-get install -y upx unzip
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install upx unzip
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install upx unzip -y
          fi
        shell: bash
      # 步骤5：原生指令运行引擎（核心：直接执行你写的Python+系统命令脚本）
      - name: Run your custom script
        run: |
          python << 'EOF'
          import os
          import sys
          import subprocess
          import requests
          import tqdm
          import zipfile
          import tarfile

          # 内置全局变量：当前平台
          runner_os = "${{ matrix.os }}"
          if runner_os == "ubuntu-latest":
              OS = "linux"
          elif runner_os == "macos-latest":
              OS = "mac"
          elif runner_os == "windows-latest":
              OS = "windows"
          
          print(f">>> 云端指令运行平台已启动，当前平台: {OS}")

          # 内置全局函数：运行系统命令，支持CMD/PowerShell/Shell
          def run(cmd):
              print(f"\n>>> 正在执行命令: {cmd}")
              ret = os.system(cmd)
              if ret != 0:
                  print(f"!!! 命令执行失败: {cmd}，错误码: {ret}")
                  # 你可以选择是否失败就退出，这里默认不退出，你也可以自己加sys.exit(1)
                  # raise Exception(f"命令执行失败: {cmd}")

          # 内置全局函数：下载文件
          def download(url, path):
              print(f">>> 正在下载: {url} -> {path}")
              resp = requests.get(url, stream=True)
              total = int(resp.headers.get('content-length', 0))
              with open(path, 'wb') as f, tqdm.tqdm(
                  desc=path,
                  total=total,
                  unit='B',
                  unit_scale=True,
                  unit_divisor=1024,
              ) as bar:
                  for data in resp.iter_content(chunk_size=1024):
                      size = f.write(data)
                      bar.update(size)

          # 内置全局函数：解压文件
          def extract(file_path, target_path):
              print(f">>> 正在解压: {file_path} -> {target_path}")
              os.makedirs(target_path, exist_ok=True)
              if file_path.endswith('.zip'):
                  with zipfile.ZipFile(file_path, 'r') as zip_ref:
                      zip_ref.extractall(target_path)
              elif file_path.endswith('.tar.gz') or file_path.endswith('.tgz'):
                  with tarfile.open(file_path, 'r:gz') as tar_ref:
                      tar_ref.extractall(target_path)
              elif file_path.endswith('.tar.bz2'):
                  with tarfile.open(file_path, 'r:bz2') as tar_ref:
                      tar_ref.extractall(target_path)

          # 直接执行你写在1.txt里的Python脚本，所有内置的函数/变量都可以直接用
          with open("1.txt", "r", encoding="utf-8") as f:
              script_content = f.read()
          
          # 执行脚本，把内置的函数/变量注入到全局
          global_vars = globals()
          exec(script_content, global_vars)

          print(f"\n>>> 所有指令执行完成！")
          EOF
        shell: bash
      # 步骤6：收集产物
      - name: Collect artifacts
        run: |
          mkdir -p dist
          # 收集所有可执行文件/产物
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv *.exe ./dist/ 2>/dev/null || true
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            mv *.bin ./dist/ 2>/dev/null || true
            mv *.AppImage ./dist/ 2>/dev/null || true
            mv *.deb ./dist/ 2>/dev/null || true
            find . -maxdepth 2 -type f -executable ! -path "./.git/*" ! -path "./.github/*" -exec mv {} ./dist/ \; 2>/dev/null || true
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            mv *.app ./dist/ 2>/dev/null || true
            find . -maxdepth 2 -type f -perm +111 ! -path "./.git/*" ! -path "./.github/*" -exec mv {} ./dist/ \; 2>/dev/null || true
          fi
        shell: bash
      # 步骤7：发布产物到Release
      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          files: ./dist/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
